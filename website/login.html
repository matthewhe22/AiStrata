<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login — StrataFlow</title>
    <meta name="description" content="Sign in to your StrataFlow dashboard. Access your automation workflows, compliance reports, and account settings. New user? Create an account.">
    <link rel="canonical" href="https://strataflow.work/login">
    <meta property="og:title" content="Member Login — StrataFlow" />
    <meta property="og:description" content="Sign in to your StrataFlow dashboard. Access automation workflows and compliance reports." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://strataflow.work/login" />
    <meta property="og:locale" content="en_AU" />
    <meta property="og:site_name" content="StrataFlow" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Member Login — StrataFlow" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0F172A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 420px;
            padding: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            text-align: center;
        }
        .logo span { color: #10B981; }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94A3B8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563EB, #10B981);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .divider {
            text-align: center;
            color: #64748B;
            margin: 24px 0;
            font-size: 0.85rem;
        }
        .hidden { display: none; }
        .error {
            color: #EF4444;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .success {
            color: #10B981;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94A3B8;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus { border-color: #2563EB; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94A3B8;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Strata<span>Flow</span></div>

        <div id="loginView">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your StrataFlow account</p>

            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
            <div id="loginError" class="error hidden"></div>

            <div class="divider">or</div>
            <button class="btn-secondary" onclick="showSignup()">Create Account</button>
            <a href="/" class="back-link">← Back to StrataFlow</a>
        </div>

        <div id="signupView" class="hidden">
            <h1>Create Account</h1>
            <p class="subtitle">Join StrataFlow today</p>

            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="John Smith" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Min 8 characters" autocomplete="new-password">
            </div>

            <button class="btn-primary" onclick="handleSignup()">Create Account</button>
            <div id="signupError" class="error hidden"></div>
            <div id="signupSuccess" class="success hidden"></div>

            <div class="divider">or</div>
            <button class="btn-secondary" onclick="showLogin()">Already have an account?</button>
            <a href="/" class="back-link">← Back to StrataFlow</a>
        </div>
    </div>

    <script>
        function redirectAfterAuth() {
            const pendingPlan = sessionStorage.getItem('sf_pending_plan');
            if (pendingPlan) {
                sessionStorage.removeItem('sf_pending_plan');
                fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plan: pendingPlan })
                })
                    .then((res) => res.json())
                    .then((data) => {
                        window.location.href = data.url || '/portal.html';
                    })
                    .catch(() => {
                        window.location.href = '/portal.html';
                    });
                return;
            }
            window.location.href = '/portal.html';
        }

        function showSignup() {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('signupView').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('signupView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            errorEl.classList.add('hidden');

            fetch('/api/auth-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
                .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
                .then(({ ok, data }) => {
                    if (!ok) {
                        errorEl.textContent = data.error || 'Sign in failed';
                        errorEl.classList.remove('hidden');
                        return;
                    }
                    redirectAfterAuth();
                })
                .catch(() => {
                    errorEl.textContent = 'Something went wrong. Please try again.';
                    errorEl.classList.remove('hidden');
                });
        }

        function handleSignup() {
            const fullName = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorEl = document.getElementById('signupError');
            const successEl = document.getElementById('signupSuccess');
            errorEl.classList.add('hidden');
            successEl.classList.add('hidden');

            fetch('/api/auth-signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, password })
            })
                .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
                .then(({ ok, data }) => {
                    if (!ok) {
                        errorEl.textContent = data.error || 'Account creation failed';
                        errorEl.classList.remove('hidden');
                        return;
                    }
                    redirectAfterAuth();
                })
                .catch(() => {
                    errorEl.textContent = 'Something went wrong. Please try again.';
                    errorEl.classList.remove('hidden');
                });
        }

        // Already signed in? Skip straight to the account portal.
        fetch('/api/auth-me').then((res) => {
            if (res.ok) redirectAfterAuth();
        });
    </script>
</body>
</html>
