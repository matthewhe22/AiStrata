<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login — StrataFlow</title>
    <meta name="description" content="Sign in to your StrataFlow dashboard. Access your automation workflows, compliance reports, and account settings. New user? Create an account.">
    <link rel="canonical" href="https://strataflow.work/login">
    <meta property="og:title" content="Member Login — StrataFlow" />
    <meta property="og:description" content="Sign in to your StrataFlow dashboard. Access automation workflows and compliance reports." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://strataflow.work/login" />
    <meta property="og:locale" content="en_AU" />
    <meta property="og:site_name" content="StrataFlow" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Member Login — StrataFlow" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0F172A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 420px;
            padding: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 32px;
            text-align: center;
        }
        .logo span { color: #10B981; }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94A3B8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #94A3B8;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .tab.active {
            background: #2563EB;
            border-color: #2563EB;
            color: #fff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94A3B8;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #2563EB;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563EB, #10B981);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .divider {
            text-align: center;
            color: #64748B;
            margin: 24px 0;
            font-size: 0.85rem;
        }
        .hidden { display: none; }
        .error {
            color: #EF4444;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .success {
            color: #10B981;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94A3B8;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Strata<span>Flow</span></div>
        
        <div id="loginForm">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your StrataFlow account</p>
            
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            </div>
            
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
            <div id="loginError" class="error hidden"></div>
            
            <div class="divider">or</div>
            
            <button class="btn-secondary" onclick="showRegister()">Create Account</button>
            <a href="/" class="back-link">← Back to StrataFlow</a>
        </div>
        
        <div id="registerForm" class="hidden">
            <h2>Create Account</h2>
            <p class="subtitle">Join StrataFlow today</p>
            
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="John Smith">
            </div>
            
            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Min 8 characters">
            </div>
            
            <button class="btn-primary" onclick="handleRegister()">Create Account</button>
            <div id="registerError" class="error hidden"></div>
            
            <div class="divider">or</div>
            
            <button class="btn-secondary" onclick="showLogin()">Already have an account?</button>
            <a href="/" class="back-link">← Back to StrataFlow</a>
        </div>
        
        <div id="forgotForm" class="hidden">
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your email to receive reset instructions</p>
            
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <input type="email" id="resetEmail" placeholder="you@example.com">
            </div>
            
            <button class="btn-primary" onclick="handleForgot()">Send Reset Link</button>
            <div id="forgotError" class="error hidden"></div>
            <div id="forgotSuccess" class="success hidden"></div>
            
            <a href="#" class="back-link" onclick="showLogin(); return false;">← Back to Sign In</a>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }
        
        function showForgot() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
        }
        
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.classList.remove('hidden');
                return;
            }
            
            // In production, this would call your backend API
            // For now, redirect to Stripe customer portal
            window.location.href = '/portal.html';
        }
        
        function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('registerError');
            
            if (!name || !email || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.classList.remove('hidden');
                return;
            }
            
            if (password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters';
                errorEl.classList.remove('hidden');
                return;
            }
            
            // In production, this would call your backend API to create user
            // Then redirect to Stripe checkout for subscription
            alert('Account created! Please subscribe to a plan to continue.');
            window.location.href = '/portal.html';
        }
        
        function handleForgot() {
            const email = document.getElementById('resetEmail').value;
            const errorEl = document.getElementById('forgotError');
            const successEl = document.getElementById('forgotSuccess');
            
            if (!email) {
                errorEl.textContent = 'Please enter your email address';
                errorEl.classList.remove('hidden');
                return;
            }
            
            // In production, this would call your backend API to send reset email
            errorEl.classList.add('hidden');
            successEl.textContent = 'Reset link sent! Check your email.';
            successEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
