<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful — StrataFlow</title>
    <meta name="description" content="Your StrataFlow subscription payment was successful. Welcome! You now have access to AI-powered strata workflow automation.">
    <link rel="canonical" href="https://strataflow.work/success">
    <meta property="og:title" content="Payment Successful — StrataFlow" />
    <meta property="og:description" content="Your StrataFlow subscription is now active." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://strataflow.work/success" />
    <meta property="og:locale" content="en_AU" />
    <meta property="og:site_name" content="StrataFlow" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0F172A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10B981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2.5rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #10B981;
        }
        .subtitle {
            font-size: 1rem;
            color: #94A3B8;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .details {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #94A3B8; }
        .detail-value { font-weight: 600; }
        .btn-primary {
            background: linear-gradient(135deg, #2563EB, #10B981);
            color: #fff;
            padding: 16px 32px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .back-link {
            display: block;
            margin-top: 16px;
            color: #94A3B8;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Payment Successful!</h1>
        <p class="subtitle">Welcome to StrataFlow! Your subscription has been activated. Check your email for confirmation details.</p>
        
        <div class="details">
            <div class="detail-row">
                <span class="detail-label">Plan</span>
                <span class="detail-value">Growth Plan</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Amount</span>
                <span class="detail-value">$1,000.00 AUD</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Next Billing</span>
                <span class="detail-value">September 3, 2025</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Receipt</span>
                <span class="detail-value">#INV-2025-001</span>
            </div>
        </div>
        
        <button class="btn-primary" onclick="window.location.href='/portal.html'">Go to My Account</button>
        <a href="/" class="back-link">← Back to StrataFlow</a>
    </div>
</body>
</html>
